<!doctype html>
<html lang="en">
  
  <head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0e17;
        color: #c8cdd8;
        font-family: 'DM Sans', sans-serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      #canvas-container {
        width: 100%;
        height: 100%;
        position: relative;
      }

      canvas { display: block; }

      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        z-index: 10;
      }

      #hud h1 {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        color: #5eead4;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      #hud .subtitle {
        font-size: 12px;
        color: #475569;
        font-family: 'JetBrains Mono', monospace;
      }

      #info-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(10, 14, 23, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(94, 234, 212, 0.15);
        border-radius: 8px;
        padding: 16px 20px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        z-index: 10;
        min-width: 260px;
      }

      #info-panel .row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }

      #info-panel .row:last-child { border: none; }
      #info-panel .label { color: #64748b; }
      #info-panel .value { color: #5eead4; font-weight: 500; }

      #controls-hint {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: rgba(10, 14, 23, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(94, 234, 212, 0.08);
        border-radius: 8px;
        padding: 12px 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: #475569;
        z-index: 10;
        line-height: 1.8;
      }

      #controls-hint span { color: #94a3b8; }

      #axis-indicator {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 90px;
        height: 90px;
        z-index: 10;
      }

      /* ─── TOOLTIP ─── */
      #tooltip {
        position: absolute;
        pointer-events: none;
        z-index: 100;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 0.2s ease, transform 0.2s ease;
        max-width: 310px;
      }

      #tooltip.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .tooltip-inner {
        background: rgba(8, 12, 21, 0.94);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(94, 234, 212, 0.25);
        border-radius: 10px;
        padding: 14px 18px;
        font-family: 'JetBrains Mono', monospace;
        box-shadow: 0 10px 40px rgba(0,0,0,0.55), 0 0 24px rgba(94, 234, 212, 0.07);
      }

      .tooltip-title {
        font-size: 12px;
        font-weight: 600;
        color: #5eead4;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tooltip-title .icon {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        display: inline-block;
        flex-shrink: 0;
      }

      .tooltip-rows {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .tooltip-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        font-size: 11px;
      }

      .tooltip-row .t-label { color: #64748b; }
      .tooltip-row .t-value { color: #e2e8f0; font-weight: 500; }

      .tooltip-desc {
        margin-top: 10px;
        font-size: 10.5px;
        color: #94a3b8;
        line-height: 1.6;
        font-family: 'DM Sans', sans-serif;
        border-top: 1px solid rgba(255,255,255,0.06);
        padding-top: 9px;
      }
</style>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cepa-tool</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
